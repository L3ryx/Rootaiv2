<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background:black;
  color:white;
  font-family:Arial;
  padding:40px;
}

input, button {
  padding:10px;
  border-radius:6px;
  border:none;
}

button {
  background:#00ff88;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>
<body>

<h1>🔐 Admin Dashboard</h1>

<p>Configurer les clés API :</p>

<input type="text" id="apiKey" placeholder="Enter API Key">
<br><br>

<button onclick="saveApi()">Save API Key</button>

<script>

async function saveApi() {

  const key = document.getElementById("apiKey").value;

  await fetch("/api/save-key", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ key })
  });

  alert("API Key saved !");
}

</script>

</body>
</html>
