<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<style>
body{margin:0;background:black;color:white;font-family:Arial;}
.topbar{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#111;
}
button{
  padding:10px 20px;
  background:green;
  border:none;
  color:white;
  font-weight:bold;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="topbar">
  <button onclick="goAdmin()">Admin</button>
  <button onclick="logout()">Déconnexion</button>
</div>

<h2 style="text-align:center;margin-top:50px;">Dashboard sécurisé</h2>

<script>
function goAdmin(){
  window.location="/admin";
}

async function logout(){
  await fetch("/api/logout",{method:"POST",credentials:"include"});
  window.location="/login";
}
</script>

</body>
</html>
