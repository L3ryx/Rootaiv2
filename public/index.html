<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
}
.topbar{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#111;
}
button{
  padding:10px 20px;
  background:green;
  border:none;
  color:white;
  font-weight:bold;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <button onclick="goAdmin()">Admin</button>
  </div>
  <div>
    <button onclick="logout()">Déconnexion</button>
  </div>
</div>

<h2 style="text-align:center;margin-top:50px;">Dashboard</h2>

<script>

document.addEventListener("DOMContentLoaded", async ()=>{

  const res = await fetch("/api/verify",{
    credentials:"include"
  });

  if(!res.ok){
    window.location="/login.html";
  }

});

function goAdmin(){
  window.location="/admin.html";
}

async function logout(){

  await fetch("/api/logout",{
    method:"POST",
    credentials:"include"
  });

  window.location="/login.html";
}

</script>

</body>
</html>
