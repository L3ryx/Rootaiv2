<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ali Search AI</title>

<style>

/* ============================= */
/* TOOL BACKGROUND FROM GITHUB */
/* ============================= */

body {
  margin:0;
  padding:0;
  font-family: Arial, sans-serif;
  color:white;

  background: url("https://raw.githubusercontent.com/TON_USERNAME/assets-tool/main/background-tool.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* Dark overlay */
body::before {
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

/* ============================= */
/* TOOL CONTAINER */
/* ============================= */

.container {
  text-align:center;
  padding-top:100px;
}

button {
  padding:12px 20px;
  background:red;
  border:none;
  border-radius:8px;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover {
  background:darkred;
}

input {
  padding:10px;
  border-radius:8px;
  border:none;
  margin:10px;
}

#logoutBtn {
  position:absolute;
  top:20px;
  right:20px;
}

</style>
</head>
<body>

<button id="logoutBtn" onclick="logout()">Logout</button>

<div class="container">

<h1>🚀 Ali Search AI</h1>

<input type="file" id="images" multiple>
<br>
<button onclick="upload()">Upload</button>

<div id="results"></div>

</div>

<script src="script.js"></script>

<script>

/* ============================= */
/* LOGOUT */
/* ============================= */

function logout(){
  const token = localStorage.getItem("token");

  fetch("/api/logout",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({ token })
  });

  localStorage.clear();
  window.location="/login.html";
}

</script>

</body>
</html>
