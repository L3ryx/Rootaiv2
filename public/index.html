<!DOCTYPE html>
<html>
<head>
<title>Ali Search AI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TOP LEFT BUTTON -->
<a href="/admin.html" class="top-left-btn">Espace Admin</a>

<!-- TITLE -->
<h1 class="title">Ali Search AI</h1>

<!-- LOGIN -->
<div id="loginSection" class="login-container">
  <input type="password" id="passwordInput" placeholder="Admin Password" />
  <button onclick="login()">Login</button>
</div>

<!-- TOOL -->
<div id="toolSection" style="display:none;" class="tool-container">

  <input type="file" id="imageInput" multiple hidden />

  <button class="upload-btn" onclick="document.getElementById('imageInput').click()">
    📤 UPLOAD IMAGES
  </button>

  <div id="preview"></div>

  <button class="search-btn" onclick="startSearch()">
    🚀 START SEARCH
  </button>

  <div id="progressContainer"></div>

</div>

<script src="/script.js"></script>
</body>
</html>
