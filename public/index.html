<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Product Finder</title>

<style>

body {
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
}

.container {
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

button {
  padding:10px 20px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.primary {
  background:#00ff88;
  color:black;
}

.settings-btn {
  position:fixed;
  top:20px;
  left:20px;
  background:#ffcc00;
  color:black;
  z-index:9999;
}

/* ================= POPUP ================= */

.popup {
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#111;
  padding:30px;
  border-radius:12px;
  border:2px solid #00ff88;
  z-index:10000;
}

.popup input {
  width:300px;
  padding:8px;
  margin-bottom:10px;
}

</style>
</head>
<body>

<!-- SETTINGS BUTTON -->

<button class="settings-btn" onclick="openSettings()">
Settings
</button>

<!-- SETTINGS POPUP -->

<div class="popup" id="settingsPopup">

<h3>API Settings</h3>

<p>IMGBB</p>
<input id="imgbb" type="text">

<p>OPENAI</p>
<input id="openai" type="text">

<p>SERPAPI</p>
<input id="serpapi" type="text">

<br>

<button class="primary" onclick="saveSettings()">
Save
</button>

<button onclick="closeSettings()" style="background:red;color:white;">
Close
</button>

</div>

<!-- MAIN UI -->

<div class="container">

<h1>AI Product Finder</h1>

<input type="file" id="fileInput">
<br><br>

<button class="primary" onclick="analyze()">
Analyze Image
</button>

<br>

<div id="result"></div>

</div>

<script>

/* ================= SETTINGS ================= */

function openSettings() {

  document.getElementById("settingsPopup").style.display = "block";

  document.getElementById("imgbb").value =
    localStorage.getItem("IMGBB_KEY") || "";

  document.getElementById("openai").value =
    localStorage.getItem("OPENAI_KEY") || "";

  document.getElementById("serpapi").value =
    localStorage.getItem("SERPAPI_KEY") || "";
}

function closeSettings() {
  document.getElementById("settingsPopup").style.display = "none";
}

function saveSettings() {

  localStorage.setItem("IMGBB_KEY",
    document.getElementById("imgbb").value);

  localStorage.setItem("OPENAI_KEY",
    document.getElementById("openai").value);

  localStorage.setItem("SERPAPI_KEY",
    document.getElementById("serpapi").value);

  alert("Keys saved locally !");
  closeSettings();
}

/* ================= ANALYZE ================= */

async function analyze() {

  const fileInput = document.getElementById("fileInput");

  if (!fileInput.files.length) {
    alert("Select image first");
    return;
  }

  const formData = new FormData();

  formData.append("image", fileInput.files[0]);

  formData.append("imgbb",
    localStorage.getItem("IMGBB_KEY"));

  formData.append("openai",
    localStorage.getItem("OPENAI_KEY"));

  formData.append("serpapi",
    localStorage.getItem("SERPAPI_KEY"));

  const res = await fetch("/analyze", {
    method:"POST",
    body: formData
  });

  const data = await res.json();

  document.getElementById("result").innerHTML =
    "<pre>" + JSON.stringify(data, null, 2) + "</pre>";
}

</script>

</body>
</html>
