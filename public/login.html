<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Ali Search AI</title>

<style>

/* ============================= */
/* BACKGROUND FROM GITHUB */
/* ============================= */

body {
  margin:0;
  padding:0;
  font-family: Arial, sans-serif;

  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;

  background: url("https://raw.githubusercontent.com/TON_USERNAME/assets-login/main/background-login.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* Dark overlay */
body::before {
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

/* ============================= */
/* LOGIN BOX */
/* ============================= */

.login-box {
  background: rgba(17,17,17,0.9);
  padding:40px;
  border-radius:15px;
  width:350px;
  text-align:center;
  box-shadow:0 0 25px red;
}

.login-box h1 {
  color:red;
  margin-bottom:20px;
}

.login-box input {
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:none;
  outline:none;
}

.login-box button {
  width:100%;
  padding:12px;
  background:red;
  border:none;
  border-radius:8px;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.login-box button:hover {
  background:darkred;
}

.register-link {
  display:block;
  margin-top:15px;
  color:white;
  text-decoration:none;
}

.register-link:hover {
  color:red;
}

</style>
</head>
<body>

<div class="login-box">

<h1>Login</h1>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<a class="register-link" href="/register.html">
Create Account
</a>

</div>

<script>

/* ============================= */
/* LOGIN FUNCTION */
/* ============================= */

async function login() {

  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  if (!username || !password) {
    alert("Fill all fields");
    return;
  }

  const res = await fetch("/api/login", {
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({ username, password })
  });

  const data = await res.json();

  if (!data.token) {
    alert("Login failed");
    return;
  }

  localStorage.setItem("token", data.token);
  localStorage.setItem("role", data.role);

  window.location = "/index.html";
}

</script>

</body>
</html>
