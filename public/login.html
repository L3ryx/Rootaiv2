<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>
<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:black;
  color:white;
  font-family:Arial;
}
.box{
  background:#111;
  padding:40px;
  border-radius:12px;
  width:320px;
  text-align:center;
}
input{
  width:100%;
  padding:12px;
  margin:10px 0;
  background:#222;
  border:none;
  color:white;
  border-radius:6px;
}
button{
  width:100%;
  padding:14px;
  background:green;
  border:none;
  color:white;
  font-weight:bold;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="box">
  <h2>Connexion</h2>
  <input id="username" placeholder="Utilisateur">
  <input id="password" type="password" placeholder="Mot de passe">
  <button onclick="login()">Se connecter</button>
  <p id="error"></p>
</div>

<script>
async function login(){

  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const res = await fetch("/api/login",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    credentials:"include",
    body:JSON.stringify({username,password})
  });

  const data = await res.json();

  if(!res.ok){
    document.getElementById("error").innerText = data.error;
    return;
  }

  window.location="/dashboard";
}
</script>

</body>
</html>
