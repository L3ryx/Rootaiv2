<!DOCTYPE html>
<html>
<head>
<title>AliExpress Image Finder</title>
</head>

<body>

<h2>Upload Image</h2>

<form method="POST" enctype="multipart/form-data">
<input type="file" name="image">
<button type="submit">Search</button>
</form>

<hr>

{% for r in results %}

<div>

<img src="{{r.image}}" width="200">

<p>Similarity: {{r.score}}%</p>

<a href="{{r.link}}" target="_blank">Voir annonce AliExpress</a>

</div>

<hr>

{% endfor %}

</body>

</html>
